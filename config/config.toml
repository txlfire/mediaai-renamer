[server]
host = "0.0.0.0"
port = 8970

[paths]
data_dir = "data"

[logging]
level = "INFO"
log_dir = "logs"
max_size_mb = 10
backup_count = 5
console_output = true

[scan]
batch_size = 100
batch_interval_seconds = 1
minimum_file_size = 0

[auth]
default_admin_enabled = true
default_admin_username = "admin"
default_admin_display_name = "系统管理员"
default_admin_password = "123456"
admin_password_reset_enabled = false
